<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ChatCore Chat</title>
		<link rel="stylesheet" href="/styles.css" />
	</head>
	<body>
		<main class="shell">
			<aside class="sidebar" aria-label="Rooms">
				<div class="brand">
					<div>
						<p class="eyebrow">ChatCore</p>
						<h1>Rooms</h1>
					</div>
					<span id="connectionStatus" class="status">Connecting</span>
				</div>

				<label class="field">
					<span>Name</span>
					<input id="displayName" autocomplete="name" />
				</label>

				<form id="roomForm" class="room-form">
					<input id="roomName" placeholder="New room" aria-label="New room name" />
					<button type="submit">Create</button>
				</form>

				<nav id="roomList" class="room-list" aria-label="Room list"></nav>
			</aside>

			<section class="chat" aria-label="Chat room">
				<header class="chat-header">
					<div>
						<p id="roomTopic" class="eyebrow">Select a room</p>
						<h2 id="roomTitle">No room selected</h2>
					</div>
					<button id="joinButton" type="button">Join</button>
				</header>

				<div id="memberList" class="members" aria-label="Members"></div>
				<div id="messages" class="messages" aria-live="polite"></div>

				<form id="messageForm" class="composer">
					<input id="messageBody" placeholder="Message" autocomplete="off" />
					<button type="submit">Send</button>
				</form>
			</section>
		</main>

		<script type="module" src="/app.js"></script>
	</body>
</html>
